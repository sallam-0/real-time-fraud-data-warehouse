name: 'fraud_dwh'
version: '1.0.0'
config-version: 2

profile: 'fraud_dwh'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ── Model Materializations ──────────────────────────────────────────
models:
  fraud_dwh:
    staging:
      +materialized: view
      +schema: STAGING
    dimensions:
      +materialized: table
      +schema: DWH
    facts:
      +materialized: incremental
      +schema: DWH

# ── Variables ────────────────────────────────────────────────────────
vars:
  # Set by Airflow at runtime: dbt run --vars '{"batch_id": "20260221_001"}'
  batch_id: 'MANUAL_RUN'
