version: 2

sources:
  - name: staging
    database: FRAUD_DWH
    schema: STAGING
    description: >
      Raw staging tables loaded from S3 via COPY INTO.
      Batch tables come from MSSQL extracts; real-time tables from Flink output.
    tables:
      # ── Batch RAW tables (MSSQL → S3 → Snowflake) ──────────────────
      - name: RAW_CUSTOMER
        description: Raw customer data from MSSQL
      - name: RAW_CUSTOMER_PHONE
        description: Raw customer phone numbers from MSSQL
      - name: RAW_ACCOUNT
        description: Raw account data from MSSQL
      - name: RAW_CARD
        description: "Raw card data from MSSQL (PCI - 1-day retention)"
      - name: RAW_BRANCH
        description: Raw branch data from MSSQL
      - name: RAW_DEPARTMENT
        description: Raw department data from MSSQL
      - name: RAW_EMPLOYEE
        description: Raw employee data from MSSQL
      - name: RAW_TRANSACTION_TYPE
        description: Raw transaction types from MSSQL
      - name: RAW_MERCHANT
        description: Raw merchant data from MSSQL
      - name: RAW_ATM
        description: Raw ATM data from MSSQL
      - name: RAW_LOAN
        description: Raw loan data from MSSQL
      - name: RAW_TRANSACTION
        description: Raw transaction data from MSSQL (batch load for snapshots)
      # ── Real-time RAW tables (Flink → S3 → Snowflake) ──────────────
      - name: RAW_REALTIME_TRANSACTION
        description: Enriched transaction data from Flink CDC (via S3 Parquet)
      - name: RAW_REALTIME_FRAUD_DETECTION
        description: ML fraud scoring results from Flink (via S3 Parquet)

