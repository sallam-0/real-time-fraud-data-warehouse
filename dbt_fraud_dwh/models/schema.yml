version: 2

models:
  # ── Staging Models ─────────────────────────────────────────────────
  - name: stg_branch
    description: Cleaned branch data from MSSQL via S3
    columns:
      - name: branch_id
        tests: [not_null, unique]

  - name: stg_department
    description: Cleaned department data from MSSQL via S3
    columns:
      - name: department_id
        tests: [not_null, unique]

  - name: stg_employee
    description: Cleaned employee data from MSSQL via S3 with SCD2 hash
    columns:
      - name: employee_id
        tests: [not_null, unique]

  - name: stg_transaction_type
    description: Cleaned transaction type data from MSSQL via S3
    columns:
      - name: transaction_type_id
        tests: [not_null, unique]

  - name: stg_merchant
    description: Cleaned merchant data from MSSQL via S3
    columns:
      - name: merchant_id
        tests: [not_null, unique]

  - name: stg_atm
    description: Cleaned ATM data from MSSQL via S3
    columns:
      - name: atm_id
        tests: [not_null, unique]

  - name: stg_customer
    description: Cleaned customer data from MSSQL via S3 with SCD2 hash
    columns:
      - name: customer_id
        tests: [not_null, unique]

  - name: stg_account
    description: Cleaned account data from MSSQL via S3 with SCD2 hash
    columns:
      - name: account_number
        tests: [not_null, unique]

  - name: stg_realtime_transaction
    description: Enriched transaction data from Flink CDC via S3 Parquet
    columns:
      - name: transaction_id
        tests: [not_null]
      - name: amount
        tests: [not_null]

  - name: stg_realtime_fraud_detection
    description: ML fraud scoring results from Flink via S3 Parquet
    columns:
      - name: transaction_id
        tests: [not_null]
      - name: fraud_score
        tests: [not_null]

  - name: stg_transaction
    description: Batch transaction data from MSSQL via S3 (for snapshot facts)
    columns:
      - name: transaction_id
        tests: [not_null, unique]
      - name: amount
        tests: [not_null]

  - name: stg_loan
    description: Batch loan data from MSSQL via S3
    columns:
      - name: loan_id
        tests: [not_null, unique]

  # ── Dimension Models ───────────────────────────────────────────────
  - name: dim_branch
    description: Branch dimension (Type 1 SCD)
    columns:
      - name: branch_key
        tests: [not_null, unique]
      - name: branch_id
        tests: [not_null]

  - name: dim_department
    description: Department dimension (Type 1 SCD)
    columns:
      - name: department_key
        tests: [not_null, unique]

  - name: dim_employee
    description: Employee dimension (SCD Type 2)
    columns:
      - name: employee_key
        tests: [not_null, unique]

  - name: dim_transaction_type
    description: Transaction type dimension (Type 1 SCD)
    columns:
      - name: transaction_type_key
        tests: [not_null, unique]

  - name: dim_merchant
    description: Merchant dimension (Type 1 SCD)
    columns:
      - name: merchant_key
        tests: [not_null, unique]

  - name: dim_atm
    description: ATM dimension (Type 1 SCD)
    columns:
      - name: atm_key
        tests: [not_null, unique]

  - name: dim_customer
    description: Customer dimension (SCD Type 2)
    columns:
      - name: customer_key
        tests: [not_null, unique]

  - name: dim_account
    description: Account dimension (SCD Type 2)
    columns:
      - name: account_key
        tests: [not_null, unique]

  # ── Fact Models ────────────────────────────────────────────────────
  - name: fact_transaction
    description: Transaction fact table from real-time Flink data
    columns:
      - name: transaction_id
        tests: [not_null, unique]
      - name: amount
        tests: [not_null]

  - name: fact_fraud_detection
    description: Fraud detection results from real-time Flink ML scoring
    columns:
      - name: transaction_id
        tests: [not_null, unique]
      - name: fraud_score
        tests: [not_null]

  - name: fact_loan_snapshot
    description: Periodic snapshot of loan balances and repayment status
    columns:
      - name: snapshot_key
        tests: [not_null, unique]
      - name: loan_id
        tests: [not_null]

  - name: fact_account_balance_snapshot
    description: Periodic snapshot of account balances and activity
    columns:
      - name: snapshot_key
        tests: [not_null, unique]
      - name: account_key
        tests: [not_null]

