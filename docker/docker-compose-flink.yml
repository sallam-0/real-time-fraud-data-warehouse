version: '3.8'

# ── Docker Secrets ────────────────────────────────────────────────────────
# The .env file is mounted as a Docker secret at /run/secrets/env_file
# inside each container that needs credentials.
secrets:
  env_file:
    file: ../config/.env

services:
  # Flink JobManager
  flink-jobmanager:
    build:
      context: .
      dockerfile: flink.Dockerfile
    container_name: flink-jobmanager
    command: jobmanager
    environment:
      - PYFLINK_CLIENT_EXECUTABLE=python3
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        state.backend: hashmap
        state.checkpoints.dir: file:///data/checkpoints
        heartbeat.interval: 1000
        heartbeat.timeout: 5000
        rest.flamegraph.enabled: true
        python.client.executable: python3
        python.executable: python3
    ports:
      - "8081:8081" # Flink Web UI
    volumes:
      - ../streaming:/opt/flink-apps
      - ../ml:/opt/ml
      - ../data:/data
      - ../config/flink.ini:/opt/flink-apps/config.ini:ro
    secrets:
      - env_file
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fraud-detection-network

  # Flink TaskManager
  flink-taskmanager:
    build:
      context: .
      dockerfile: flink.Dockerfile
    container_name: flink-taskmanager
    command: taskmanager
    environment:
      - PYFLINK_CLIENT_EXECUTABLE=python3
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 4096m
        state.backend: hashmap
        state.checkpoints.dir: file:///data/checkpoints
        python.client.executable: python3
        python.executable: python3
    depends_on:
      - flink-jobmanager
    volumes:
      - ../streaming:/opt/flink-apps
      - ../ml:/opt/ml
      - ../data:/data
      - ../config/flink.ini:/opt/flink-apps/config.ini:ro
    secrets:
      - env_file
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fraud-detection-network

  # Redis for dimension table caching
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - ../data/redis:/data
    networks:
      - fraud-detection-network
    healthcheck:
      test: redis-cli ping | grep PONG
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  fraud-detection-network:
    driver: bridge

volumes:
  flink-data:
  redis-data:
