version: '3.8'

# ── Docker Secrets ────────────────────────────────────────────────────────
secrets:
  env_file:
    file: ../config/.env

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow.Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__ENABLE_XCOM_PICKLING: 'true'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    # dbt project path inside the container
    DBT_PROJECT_DIR: /opt/airflow/dbt_fraud_dwh
    # AWS credentials for S3 access will be loaded from the env_file
    # Snowflake credentials for dbt
    # DBT_SNOWFLAKE_PASSWORD: ${DBT_SNOWFLAKE_PASSWORD}
    # Pip packages
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      astronomer-cosmos==1.3.0 dbt-snowflake==1.7.0 snowflake-connector-python==3.6.0 pyodbc==5.1.0 boto3==1.34.0 pandas==2.1.4 pyarrow==14.0.2 apache-airflow-providers-amazon==8.13.0 scikit-learn==1.3.2 joblib==1.3.2
  volumes:
    - ../pipelines/dags:/opt/airflow/dags
    - ../dbt_fraud_dwh:/opt/airflow/dbt_fraud_dwh
    - ../streaming:/opt/airflow/flink-jobs
    - ../ml/models:/opt/airflow/models
    - airflow-logs:/opt/airflow/logs
  secrets:
    - env_file
  extra_hosts:
    - "host.docker.internal:host-gateway"
  networks:
    - fraud-detection-network
  depends_on:
    postgres:
      condition: service_healthy

services:
  # Postgres metadata DB for Airflow
  postgres:
    image: postgres:15-alpine
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB:-airflow}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - fraud-detection-network
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Airflow Init — run DB migrations + create admin user
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password ${AIRFLOW_WEBSERVER_PASSWORD:-admin} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@fraud-dwh.local
    restart: "no"

  # Airflow Webserver
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8085:8080"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # Airflow Scheduler
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: [ "CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$(hostname)" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

networks:
  fraud-detection-network:
    driver: bridge

volumes:
  postgres-data:
  airflow-logs:
