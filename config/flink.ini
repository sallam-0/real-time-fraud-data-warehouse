# Configuration for Transaction CDC Enrichment Flink Job
# =========================================================

[kafka]
bootstrap_servers = kafka:9092
input_topic = bank_cdc.BankingSystem.dbo.Transaction
output_topic = enriched.Transaction
consumer_group = flink-cdc-enrichment-ml-v2
starting_offsets = earliest

[mssql]
host = host.docker.internal
port = 1433
database = BankingSystem
user = sa
password = YOUR_MSSQL_PASSWORD_HERE
driver = ODBC Driver 17 for SQL Server

# Connection pool settings
max_pool_size = 10
connection_timeout = 30

[redis]
host = redis
port = 6379
db = 0
password =
# TTL for cached dimension data (in seconds) - 24 hours
ttl = 86400
# Prefix for Redis keys
customer_prefix = customer:
account_prefix = account:

[output]
# Output modes: s3 (production), console (debug)
mode = s3

[s3]
# AWS S3 configuration for data lake storage
bucket = aws.s3-sallameu
region = eu-central-1
access_key_id = YOUR_AWS_ACCESS_KEY_HERE
secret_access_key = YOUR_AWS_SECRET_KEY_HERE
# S3 key prefixes for Flink output
transaction_prefix = real-time/transactions
fraud_detection_prefix = real-time/fraud-detection
# Number of records to buffer before flushing to S3
batch_size = 100
# Maximum seconds between flushes (even if batch_size not reached)
flush_interval_seconds = 60

[ml]
# Path to save/load the trained scikit-learn model
model_path = /opt/ml/models/fraud_model.joblib
# Decision threshold: scores >= threshold are flagged as fraud
threshold = 0.5
# Model metadata (must match DIM_FRAUD_MODEL entry)
model_name = FraudGuard-IsoForest
model_version = v1.0.0

[snowflake]
# Snowflake connection for supervised retraining (label retrieval)
# Used by train_fraud_model.py --mode supervised
account = AGREMWF-RQ59577
password = YOUR_SNOWFLAKE_PASSWORD_HERE
database = FRAUD_DWH
schema = DWH
warehouse = COMPUTE_WH
role = ACCOUNTADMIN

[flink]
# Parallelism for the Flink job
parallelism = 2

# Checkpoint interval in milliseconds
checkpoint_interval_ms = 60000

# State backend: hashmap or rocksdb
state_backend = hashmap

# Watermark delay for late data
watermark_delay_ms = 600000

# Async I/O capacity (max concurrent Redis lookups)
async_io_capacity = 100

# Async I/O timeout in milliseconds
async_io_timeout_ms = 10000

[feature_engineering]
# High value transaction threshold
high_value_threshold = 10000

# Velocity thresholds
high_velocity_1h = 5
high_velocity_24h = 20

# Unusual amount multiplier
unusual_amount_multiplier = 3

# Risk score weights
risk_weight_high_value = 3
risk_weight_international = 2
risk_weight_night_transaction = 1
risk_weight_location_mismatch = 2
risk_weight_new_account = 1

[monitoring]
# Enable metrics
enable_metrics = true

# Logging level: DEBUG, INFO, WARN, ERROR
log_level = INFO
